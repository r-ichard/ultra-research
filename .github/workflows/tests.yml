name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r skills/research/requirements.txt

      - name: Syntax check (all scripts)
        run: |
          python -m py_compile skills/research/scripts/lib.py
          python -m py_compile skills/research/scripts/serp.py
          python -m py_compile skills/research/scripts/fetch.py
          python -m py_compile skills/research/scripts/extract_meta.py
          python -m py_compile skills/research/scripts/bootstrap.py

      - name: Run test suite
        run: |
          cd skills/research/scripts
          python test_date_features.py
